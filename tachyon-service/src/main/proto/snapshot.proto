syntax = "proto3";
package tech.skworks.tachyon.service.contracts.snapshot;

import "google/protobuf/empty.proto";
import "google/protobuf/any.proto";

import "player.proto";

option java_multiple_files = true;
option java_package = "tech.skworks.tachyon.service.contracts.snapshot";

service SnapshotService {
  rpc TakeDatabaseSnapshot (TakeDatabaseSnapshotRequest) returns (google.protobuf.Empty);
  rpc TakeComponentSnapshot (TakeComponentSnapshotRequest) returns (google.protobuf.Empty);
  rpc ToggleLockSnapshot (ToggleLockSnapshotRequest) returns (ToggleLockSnapshotResponse);
  rpc RevertToSnapshot (RevertToSnapshotRequest) returns (tech.skworks.tachyon.service.contracts.player.GetPlayerResponse);
  rpc ListSnapshots (ListSnapshotsRequest) returns (ListSnapshotsResponse);
  rpc DecodeSnapshot (DecodeSnapshotRequest) returns (DecodeSnapshotResponse);
}

message TakeDatabaseSnapshotRequest {
  SnapshotTriggerType trigger_type = 1;
  string player_id = 2;
  string reason = 3;
}

message TakeComponentSnapshotRequest {
  SnapshotTriggerType trigger_type = 1;
  string player_id = 2;
  string reason = 3;
  string target_component = 4;
  bytes raw_data = 5;
}

message ToggleLockSnapshotRequest {
  string snapshot_id = 1;
  string locker_id = 2;
}

message ToggleLockSnapshotResponse {
  bool lock_status = 1;
}

message RevertToSnapshotRequest {
  string player_id = 1;
  string snapshot_id = 2;
}

message ListSnapshotsRequest {
  string player_id = 1;
}

message ListSnapshotsResponse {
  string player_id = 1;
  repeated SnapshotInfo snapshots = 2;
}

message DecodeSnapshotRequest {
  string snapshot_id = 1;
}

message DecodeSnapshotResponse {
  string snapshot_id = 1;
  map<string, google.protobuf.Any> components = 2;
}

message SnapshotInfo {
  string snapshot_id = 1;
  int64 timestamp = 2;
  SnapshotTriggerType trigger_type = 3;
  string reason = 4;
  string source = 5;
  string granularity = 6;
}

enum SnapshotTriggerType {
  SNAPSHOT_TRIGGER_UNSPECIFIED = 0;
  SNAPSHOT_TRIGGER_SPIGOT_TASK = 1;
  SNAPSHOT_TRIGGER_MANUAL = 2;
  SNAPSHOT_TRIGGER_OTHER = 3;
}
