syntax = "proto3";

option java_multiple_files = true;
option java_package = "tech.skworks.tachyon.service.contracts.system";

package tech.skworks.tachyon.service.contracts.system;

service System {
  rpc Ping (PingRequest) returns (PingResponse);
}

message PingRequest {
  int64 client_time = 1;
  string spigot_server_name = 2;
}

message PingResponse {
  int64 server_time = 1;
  string tachyon_server_name = 2;
}
