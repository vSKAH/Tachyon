syntax = "proto3";
package tech.skworks.tachyon.service.contracts.audit;

import "google/protobuf/empty.proto";

option java_multiple_files = true;
option java_package = "tech.skworks.tachyon.service.contracts.audit";

service AuditService {
  rpc LogEvent (LogRequest) returns (google.protobuf.Empty);
  rpc LogEventBatch (LogBatchRequest) returns (google.protobuf.Empty);
}

message LogRequest {
  string uuid = 1;
  string module = 2;
  string action = 3;
  string details = 4;
  int64 timestamp_ms = 5;
}

message LogBatchRequest {
  repeated LogRequest logs = 1;
}
