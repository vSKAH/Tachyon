syntax = "proto3";
package tech.skworks.tachyon.service.contracts.player;

import "google/protobuf/empty.proto";
import "google/protobuf/any.proto";

option java_multiple_files = true;
option java_package = "tech.skworks.tachyon.service.contracts.player";


service PlayerDataService {
  rpc GetPlayer             (PlayerRequest)          returns (PlayerResponse);
  rpc SaveComponent         (SaveComponentRequest)   returns (google.protobuf.Empty);
  rpc SaveProfile           (SaveProfileRequest)     returns (google.protobuf.Empty);
  rpc DeleteComponent       (DeleteComponentRequest) returns (google.protobuf.Empty);
  rpc PlayerHeartBeat       (PlayerRequest)          returns (google.protobuf.Empty);
  rpc PlayerHeartBeatBatch  (HeartBeatBatchRequest)  returns (google.protobuf.Empty);
  rpc FreePlayer            (PlayerRequest)          returns (google.protobuf.Empty);
}

message PlayerRequest {
  string uuid = 1;
}

message PlayerResponse {
  string uuid = 1;
  repeated google.protobuf.Any components = 5;
}

message SaveComponentRequest {
  string uuid = 1;
  google.protobuf.Any component = 2;
}

message DeleteComponentRequest {
  string uuid = 1;
  string component_url = 2;
}

message SaveProfileRequest {
  string uuid = 1;
  repeated google.protobuf.Any components = 2;
}

message HeartBeatBatchRequest {
  repeated PlayerRequest beat = 1;
}
