syntax = "proto3";
package tech.skworks.tachyon.service.contracts.player;

import "google/protobuf/empty.proto";
import "google/protobuf/any.proto";

option java_multiple_files = true;
option java_package = "tech.skworks.tachyon.service.contracts.player";


service PlayerDataService {
  rpc GetPlayer             (GetPlayerRequest)            returns (GetPlayerResponse);
  rpc SaveComponent         (SaveComponentRequest)        returns (google.protobuf.Empty);
  rpc SaveProfile           (SaveProfileRequest)          returns (google.protobuf.Empty);
  rpc DeleteComponent       (DeleteComponentRequest)      returns (google.protobuf.Empty);
  rpc PlayerHeartBeat       (PlayerHeartBeatRequest)      returns (google.protobuf.Empty);
  rpc PlayerHeartBeatBatch  (PlayerHeartBeatBatchRequest) returns (google.protobuf.Empty);
  rpc FreePlayer            (FreePlayerRequest)           returns (google.protobuf.Empty);
}

message GetPlayerRequest {
  string uuid = 1;
}

message GetPlayerResponse {
  string uuid = 1;
  repeated google.protobuf.Any components = 2;
}

message SaveComponentRequest {
  string uuid = 1;
  google.protobuf.Any component = 2;
}

message DeleteComponentRequest {
  string uuid = 1;
  string component_url = 2;
}

message SaveProfileRequest {
  string uuid = 1;
  repeated google.protobuf.Any components = 2;
}

message PlayerHeartBeatRequest {
  string uuid = 1;
}

message PlayerHeartBeatBatchRequest {
  repeated string uuids = 1;
}

message FreePlayerRequest {
  string uuid = 1;
}